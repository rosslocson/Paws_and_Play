<!DOCTYPE html>
<html lang="en">

<head>
    <title>Paws & Play - Contact Us</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link href="style.css" rel="stylesheet" type="text/css">
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            padding-top: 0; /* cancel the global fixed-navbar offset; nav is relative here */
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #myPage .navbar-fixed-top {
            position: relative;
            top: auto;
        }
        #contact {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-sizing: border-box;
        }
        footer {
            flex-shrink: 0;
            margin: 0;
        }
    </style>
</head>

<body id="myPage">

    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="index.html">Paws & Play</a>
            </div>
            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT US</a></li>
                    <li><a href="services.html">SERVICES</a></li>
                    <li><a href="products.html">PRODUCTS</a></li>
                    <li><a href="packages.html">PACKAGES</a></li>
                    <li class="active"><a href="contact.html">CONTACT US</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- Contact Section -->
    <div id="contact" class="container-fluid bg-grey">
        <h2 class="text-center">CONTACT</h2>
        <div class="row">
            <div class="col-sm-5">
                <p>Contact us and we'll get back to you within 24 hours.</p>
                <p><span class="glyphicon glyphicon-map-marker"></span> San Pablo City, Laguna</p>
                <p><span class="glyphicon glyphicon-phone"></span> +639123456789</p>
                <p><span class="glyphicon glyphicon-envelope"></span> pawsandplay@gmail.com</p>
            </div>
            <div class="col-sm-7 slideanim">
                <div class="row">
                    <div class="col-sm-6 form-group">
                        <input class="form-control" id="name" name="name" placeholder="Name" type="text" required>
                    </div>
                    <div class="col-sm-6 form-group">
                        <input class="form-control" id="email" name="email" placeholder="Email" type="email" required>
                    </div>
                </div>
                <textarea class="form-control" id="comments" name="comments" placeholder="Comment" rows="5"></textarea><br>
                <div class="row">
                    <div class="col-sm-12 form-group">
                        <button class="btn btn-default pull-right" type="submit"><a href="login.html">Send</a></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-social">
                <a href="https://www.facebook.com/YourFacebookPage" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/YourInstagramPage" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/YourTwitterPage" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://www.tiktok.com/@YourTikTokPage" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="footer-credit">Web Systems and Technologies Midterm Project</div>
        </div>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {
            function revealSlides() {
                $(".slideanim").each(function () {
                    var pos = $(this).offset().top;
                    var winTop = $(window).scrollTop();
                    if (pos < winTop + $(window).height() - 100) {
                        $(this).addClass("slide");
                    }
                });
            }
            revealSlides(); // run once on page load so content already in view shows up
            $(window).scroll(revealSlides);
        });
    </script>

</body>

</html>
